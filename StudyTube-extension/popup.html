<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyTube AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">
          <span class="logo-name">StudyTube AI</span>
          <span class="logo-tagline">Active learning on YouTube</span>
        </div>
      </div>
      <label class="toggle" title="Enable / disable">
        <input type="checkbox" id="toggle-enabled" />
        <span class="toggle-track"></span>
      </label>
    </header>

    <!-- API Key Section -->
    <section class="section">
      <label class="label">
        Gemini / Google API Key
        <a class="label-link" href="https://console.cloud.google.com/apis/credentials" target="_blank">Get key ↗</a>
      </label>
      <div class="input-row">
        <input
          type="password"
          id="api-key"
          class="input"
          placeholder="Enter your Google API key"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="icon-btn" id="toggle-visibility" title="Show/hide">👁</button>
      </div>
      <p class="hint">Stored locally in your browser. Sent only to Google Generative API (Gemini).</p>
    </section>

    <!-- Quiz Interval -->
    <section class="section">
      <label class="label">Quiz interval</label>
      <div class="interval-row">
        <button class="interval-btn" data-min="2">2 min</button>
        <button class="interval-btn active" data-min="3">3 min</button>
        <button class="interval-btn" data-min="5">5 min</button>
        <button class="interval-btn" data-min="10">10 min</button>
      </div>
      <p class="hint">How often a comprehension question appears while watching.</p>
    </section>

    <!-- Save Button -->
    <button class="save-btn" id="save-btn">Save Settings</button>

    <!-- Status -->
    <div class="status-bar" id="status-bar"></div>

    <!-- Stats -->
    <section class="stats-section" id="stats-section" style="display:none">
      <div class="divider"></div>
      <p class="stats-title">This Session</p>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-lbl">Asked</span>
        </div>
        <div class="stat">
          <span class="stat-num green" id="stat-correct">0</span>
          <span class="stat-lbl">Correct</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-pct">—</span>
          <span class="stat-lbl">Score</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Powered by Gemini / Google Generative API</span>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
